        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    try {
                        const iconData = window.lucide.icons[name];
                        if (iconData) {
                            iconRef.current.innerHTML = '';
                            window.lucide.createIcons({
                                attrs: {
                                    class: className,
                                    'stroke-width': 2,
                                    width: size,
                                    height: size
                                },
                                nameAttr: 'data-lucide',
                                icons: { [name]: iconData }
                            });
                        }
                    } catch (e) {
                        console.error("Lucide error:", e);
                    }
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className={className} style={{ width: size, height: size, display: 'inline-block', verticalAlign: 'middle' }}></i>;
        };
